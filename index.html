<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Market Live Dashboard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00ff88; font-size: 1.5rem; }
        .widget-container { height: 600px; width: 100%; max-width: 1000px; margin: 0 auto; border: 1px solid #333; border-radius: 10px; overflow: hidden; }
        .footer { text-align: center; margin-top: 20px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>Global Market Live Monitor</h1>

    <div class="widget-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            {
            "colorTheme": "dark",
            "dateRange": "12M",
            "showChart": true,
            "locale": "id",
            "width": "100%",
            "height": "100%",
            "largeChartUrl": "",
            "isTransparent": false,
            "showSymbolLogo": true,
            "showFloatingTooltip": false,
            "tabs": [
                {
                "title": "Saham & Indeks",
                "symbols": [
                    { "s": "FOREXCOM:SPX500", "d": "S&P 500" },
                    { "s": "FOREXCOM:DJI", "d": "Dow 30" },
                    { "s": "NASDAQ:AAPL", "d": "Apple" },
                    { "s": "NASDAQ:TSLA", "d": "Tesla" }
                ]
                },
                {
                "title": "Forex & Emas",
                "symbols": [
                    { "s": "FX_IDC:EURUSD", "d": "EUR/USD" },
                    { "s": "FX_IDC:GBPUSD", "d": "GBP/USD" },
                    { "s": "OANDA:XAUUSD", "d": "Gold (Emas)" },
                    { "s": "OANDA:XAGUSD", "d": "Silver" }
                ]
                },
                {
                "title": "Crypto",
                "symbols": [
                    { "s": "BINANCE:BTCUSDT", "d": "Bitcoin" },
                    { "s": "BINANCE:ETHUSDT", "d": "Ethereum" },
                    { "s": "BINANCE:SOLUSDT", "d": "Solana" }
                ]
                }
            ]
            }
            </script>
        </div>
    </div>
    <div class="footer">Data disediakan secara real-time oleh TradingView API</div>

</body>
</html>
