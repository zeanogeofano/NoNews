<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Market Monitor - Proyek AI & Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Global Market Live Monitor</h1>
        <p>Analisis Real-Time: Crypto, Forex, & Komoditas</p>
    </header>

    <main>
        <div class="widget-container">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                "colorTheme": "dark",
                "dateRange": "12M",
                "showChart": true,
                "locale": "id",
                "width": "100%",
                "height": "600",
                "largeChartUrl": "",
                "isTransparent": false,
                "showSymbolLogo": true,
                "showFloatingTooltip": false,
                "tabs": [
                    {
                    "title": "Forex & Emas",
                    "symbols": [
                        { "s": "OANDA:XAUUSD", "d": "Gold (XAU/USD)" },
                        { "s": "FX_IDC:EURUSD", "d": "EUR/USD" },
                        { "s": "FX_IDC:GBPUSD", "d": "GBP/USD" },
                        { "s": "OANDA:XAGUSD", "d": "Silver" }
                    ]
                    },
                    { "title": "Crypto",
                    "symbols": [
                        { "s": "BINANCE:BTCUSDT", "d": "Bitcoin" },
                        { "s": "BINANCE:ETHUSDT", "d": "Ethereum" },
                        { "s": "BINANCE:SOLUSDT", "d": "Solana" },
                        { "s": "BINANCE:BNBUSDT", "d": "BNB" }
                    ]
                    },
                    { "title": "Indeks Dunia",
                    "symbols": [
                        { "s": "FOREXCOM:SPX500", "d": "S&P 500" },
                        { "s": "FOREXCOM:DJI", "d": "Dow 30" },
                        { "s": "NASDAQ:IXIC", "d": "Nasdaq" }
                    ]
                    }
                ]
                }
                </script>
            </div>
            </div>
    </main>

    <footer>
        <p>Dibuat untuk portofolio GitHub | Data oleh TradingView</p>
    </footer>

</body>
</html>
