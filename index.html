<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeano Finance | Premium Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stockModal" class="modal-overlay">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <div id="modalSymbol" style="font-size: 24px; font-weight: 800;">AAPL</div>
                <button onclick="closeModal()" class="close-btn">✕</button>
            </div>
            
            <div id="modalWidgetContainer" style="height: 400px; margin-top: 20px;">
                </div>

            <div class="modal-info">
                <div class="label-sm">Market Sentiment</div>
                <p id="modalDesc" style="color: var(--text-dim); font-size: 13px; margin-top: 5px;">
                    Memuat analisis teknis real-time...
                </p>
            </div>
        </div>
    </div>

    <script>
        function openStockDetail(symbol) {
            const modal = document.getElementById('stockModal');
            document.getElementById('modalSymbol').innerText = symbol;
            modal.style.display = 'flex';
            
            // Masukkan Widget Chart Teknis secara dinamis
            const container = document.getElementById('modalWidgetContainer');
            container.innerHTML = ''; // Reset isi sebelumnya
            
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
            script.async = true;
            script.innerHTML = JSON.stringify({
                "interval": "1m",
                "width": "100%",
                "isTransparent": true,
                "height": "100%",
                "symbol": symbol,
                "showIntervalTabs": true,
                "displayMode": "single",
                "locale": "id",
                "colorTheme": "dark"
            });
            container.appendChild(script);
        }

        function closeModal() {
            document.getElementById('stockModal').style.display = 'none';
        }

        // Menutup modal jika klik di luar kotak
        window.onclick = function(event) {
            const modal = document.getElementById('stockModal');
            if (event.target == modal) { closeModal(); }
        }
    </script>

    <div class="header-flex">
        <div style="display: flex; gap: 14px; align-items: center;">
            <div class="avatar-glow">Z</div>
            <div>
                <div style="font-weight: 700; font-size: 16px;">Zeano Geofano</div>
                <div style="font-size: 12px; color: var(--text-dim);">Pro Trading Account</div>
            </div>
        </div>
        <div style="background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 14px;">🔔</div>
    </div>

    <div class="glass-card">
        <p class="label-sm">Total Assets Balance</p>
        <h1 class="amount">$12,840.50</h1>
        <span class="trend-tag">▲ +3.42% Today</span>
    </div>

    <div class="section-title">
        <div class="dot-live"></div> Market Watchlist
    </div>
    
    <div class="glass-card" style="padding: 10px; border-radius: 20px;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            {
              "colorTheme": "dark",
              "dateRange": "12M",
              "showChart": true,
              "locale": "id",
              "width": "100%",
              "height": "350",
              "isTransparent": true,
              "symbols": [
                { "s": "NASDAQ:AAPL", "d": "Apple" },
                { "s": "NASDAQ:TSLA", "d": "Tesla" },
                { "s": "OANDA:XAUUSD", "d": "Gold / Emas" },
                { "s": "BITSTAMP:BTCUSD", "d": "Bitcoin" }
              ]
            }
            </script>
        </div>
    </div>

    <div class="section-title">Latest Market News</div>
    <div class="glass-card" style="padding: 0; height: 450px; overflow: hidden;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
            {
              "feedMode": "all_symbols",
              "colorTheme": "dark",
              "isTransparent": true,
              "width": "100%",
              "height": "100%"
            }
            </script>
        </div>
    </div>

    <nav class="nav-dock">
        <a href="#" class="nav-btn active">🏠</a>
        <a href="#" class="nav-btn">📊</a>
        <a href="#" class="nav-btn">📰</a>
        <a href="#" class="nav-btn">👤</a>
    </nav>

</body>
</html>
